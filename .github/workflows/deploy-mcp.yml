name: Deploy MCP Cloud

on:
  push:
    branches:
      - main
    paths:
      - "apps/mcp-server-cloud/**"
      - ".github/workflows/deploy-mcp.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after build, typecheck, and tests"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mcp-server-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mcp-server-cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke script syntax
        run: bash -n scripts/smoke-test.sh

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'push' || inputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: apps/mcp-server-cloud
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --vm-size shared-cpu-1x
