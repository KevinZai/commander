name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check for submodule updates
        id: check
        run: |
          git submodule update --remote --init
          CHANGES=$(git diff --name-only)
          if [ -z "$CHANGES" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No submodule updates found"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Updates found in: $CHANGES"

            echo "## Submodule Updates" > /tmp/pr-body.md
            echo "" >> /tmp/pr-body.md

            git submodule foreach --quiet '
              LOCAL=$(git rev-parse HEAD@{1} 2>/dev/null || echo "unknown")
              REMOTE=$(git rev-parse HEAD)
              if [ "$LOCAL" != "$REMOTE" ] && [ "$LOCAL" != "unknown" ]; then
                echo "### $name" >> /tmp/pr-body.md
                echo "" >> /tmp/pr-body.md
                echo "Updated from \`${LOCAL:0:7}\` to \`${REMOTE:0:7}\`" >> /tmp/pr-body.md
                echo "" >> /tmp/pr-body.md
                git log --oneline $LOCAL..$REMOTE | head -20 | sed "s/^/- /" >> /tmp/pr-body.md
                echo "" >> /tmp/pr-body.md
              fi
            '
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update submodules to latest upstream'
          title: 'chore: weekly submodule sync'
          body-path: /tmp/pr-body.md
          branch: chore/upstream-sync
          delete-branch: true
          labels: dependencies,automated
