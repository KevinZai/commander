<title>dashboard — CC Commander</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
    padding: 16px;
    margin: 0;
  }
  .terminal {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 100%;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .title-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #21262d;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-red { background: #ff5f56; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #27c93f; }
  .title-text {
    color: #8b949e;
    font-size: 12px;
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .content {
    font-size: 14px;
    line-height: 1.0;
    color: #c9d1d9;
    white-space: pre;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
