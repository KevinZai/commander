<text x="240" y="318" fill="#555" font-family="'SF Mono','Fira Code',monospace" font-size="11">v2.0.0</text>
<text x="310" y="318" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold">my-saas-app</text>
<text x="70" y="336" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="11">Every Claude Code tool. One install. Guided access.</text>

