  <!-- Version tag -->
  <rect x="1042" y="149" width="100" height="18" rx="3" fill="#3fb950" fill-opacity="0.2" stroke="#3fb950" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1092" y="161" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">v2.3.0+</text>

