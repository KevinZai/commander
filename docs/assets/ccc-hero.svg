<rect x="325" y="383" width="130" height="11" rx="3" fill="#161b22"/>
<rect x="325" y="383" width="30" height="11" rx="3" fill="url(#cyber)" opacity="0.7"/>
<text x="465" y="392" fill="#ff0080" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">23%</text>

<!-- Stats row -->
<text x="70" y="414" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">CC-48</text>
<text x="120" y="414" fill="#777" font-family="'SF Mono','Fira Code',monospace" font-size="10">v2.0 Foundation</text>
<text x="275" y="414" fill="#444" font-family="'SF Mono','Fira Code',monospace" font-size="10">|</text>
<text x="295" y="414" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">432 skills</text>
<text x="395" y="414" fill="#444" font-family="'SF Mono','Fira Code',monospace" font-size="10">|</text>
<text x="415" y="414" fill="#ff0080" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">11 vendors</text>
<text x="515" y="414" fill="#444" font-family="'SF Mono','Fira Code',monospace" font-size="10">|</text>
<text x="535" y="414" fill="#50ff78" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">gstack</text>

<!-- Fading divider -->
<rect x="60" y="426" width="400" height="1" fill="#333" opacity="0.3"/>

<!-- Menu prompt -->
<text x="70" y="452" fill="#eee" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold">What would you like to do?</text>

<!-- Selected item: FIRE GRADIENT -->
<text x="72" y="480" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold">&gt;</text>
<text x="90" y="480" fill="url(#fire)" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold" filter="url(#softglow)">Build something new</text>
<text x="90" y="497" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="10">websites, APIs, CLI tools</text>

<!-- Unselected items: bright readable -->
<text x="90" y="524" fill="#ccc" font-family="'SF Mono','Fira Code',monospace" font-size="13">Import a project</text>
<text x="90" y="541" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="10">/xray audit + /makeover</text>

<text x="90" y="564" fill="#ccc" font-family="'SF Mono','Fira Code',monospace" font-size="13">Create content</text>
<text x="90" y="581" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="10">blog, social, email</text>

<text x="90" y="604" fill="#ccc" font-family="'SF Mono','Fira Code',monospace" font-size="13">YOLO Mode</text>
<text x="90" y="621" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="10">autonomous overnight build</text>

<text x="90" y="644" fill="#ccc" font-family="'SF Mono','Fira Code',monospace" font-size="13">Autonomous Mode</text>
<text x="90" y="661" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="10">loops, dispatch, background agents</text>

<text x="90" y="684" fill="#ccc" font-family="'SF Mono','Fira Code',monospace" font-size="13">Browse CCC Domains</text>
<text x="90" y="701" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="10">11 domains, 172+ sub-skills</text>

<!-- Footer -->
<text x="460" y="730" text-anchor="middle" fill="#333" font-family="'SF Mono','Fira Code',monospace" font-size="10">CC Commander v2.0.0 by Kevin Z - kevinz.ai - @kzic</text>
