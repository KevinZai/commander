# Fly.io configuration for CC Commander hosted MCP.
#
# First-time setup:
#   fly launch --no-deploy --name commander-mcp --region iad
#
# Runtime secrets are intentionally not stored in this file:
#   fly secrets set SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... \
#     UPSTASH_REDIS_REST_URL=... UPSTASH_REDIS_REST_TOKEN=... \
#     JWT_SECRET=... POSTHOG_API_KEY=... --app commander-mcp

app = "commander-mcp"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  count = 1
  size = "shared-cpu-1x"
  memory = "512mb"

[processes]
  app = "node dist/index.js"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[deploy]
  release_command = "node -e 'console.log(\"deploy check: ok\")'"
  strategy = "rolling"
