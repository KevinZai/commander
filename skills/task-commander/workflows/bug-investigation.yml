# Task Commander — Bug Investigation Workflow
# DAG: reproduce → isolate → fix → verify → regression-test
#
# Usage: Used by Task Commander for bug hunting and fixing.
# Follows the principle: reproduce first, understand second, fix third.

name: bug-investigation
description: Systematic bug investigation from reproduction through verified fix with regression testing
scope: P2-P8

tasks:
  - id: reproduce
    agent: claude-haiku
    timeout_ms: 180000
    retries: 2
    prompt: |
      You are a QA engineer tasked with reproducing a reported bug.

      Bug report:
      {{bug_description}}

      Project: {{project_name}}
      Stack: {{tech_stack}}

      Your job:
      1. **Understand the report** — What is the expected behavior? What actually happens?
      2. **Create a minimal reproduction** — Write the simplest test case that triggers the bug
      3. **Document the reproduction steps** — Exact commands or actions to trigger the bug
      4. **Gather context** — Check error logs, stack traces, related code

      Steps:
      a. Read the code paths mentioned in the bug report
      b. Write a failing test that demonstrates the bug
      c. Run the test — confirm it fails with the reported error
      d. Document the exact error message and stack trace

      Output format:
      ```markdown
      # Bug Reproduction: {{bug_title}}

      ## Expected Behavior
      {{what_should_happen}}

      ## Actual Behavior
      {{what_actually_happens}}

      ## Reproduction Steps
      1. {{step_1}}
      2. {{step_2}}
      ...

      ## Failing Test
      ```typescript
      // test file content that fails
      ```

      ## Error Output
      ```
      {{exact_error_message_and_stack_trace}}
      ```

      ## Affected Code Paths
      - {{file_1}}:{{line}} — {{what_this_code_does}}
      - {{file_2}}:{{line}} — {{what_this_code_does}}

      ## Reproduction Confidence: HIGH / MEDIUM / LOW
      {{explain_confidence_level}}
      ```

      Rules:
      - The failing test MUST actually fail when run (verify it)
      - Do NOT attempt to fix the bug — only reproduce it
      - If you cannot reproduce, say so clearly and list what you tried
      - Include exact error messages — do not paraphrase
    verification: |
      Reproduction must include:
      - [ ] A failing test that demonstrates the bug
      - [ ] The test actually fails when run (not just hypothetical)
      - [ ] Exact error message captured
      - [ ] Affected code paths identified

  - id: isolate
    agent: claude-sonnet
    depends_on: [reproduce]
    timeout_ms: 180000
    retries: 2
    prompt: |
      You are a senior debugger isolating the root cause of a bug.

      Reproduction report:
      {{reproduce.output}}

      Your job:
      1. **Trace the execution path** — Follow the code from trigger to error
      2. **Identify the root cause** — What specifically causes the incorrect behavior?
      3. **Distinguish root cause from symptoms** — The error message is a symptom. What causes it?
      4. **Check for siblings** — Are there similar patterns elsewhere that have the same bug?

      Investigation approach:
      a. Read all files in the affected code paths
      b. Trace data flow from input to error
      c. Identify the exact line(s) where behavior diverges from expected
      d. Check if the bug is in the code, the data, or the dependencies
      e. Search the codebase for similar patterns that might have the same issue

      Output format:
      ```markdown
      # Root Cause Analysis: {{bug_title}}

      ## Root Cause
      {{one_paragraph_explanation}}

      ## Evidence
      - File: {{file}}:{{line}}
      - The code does: {{what_it_does}}
      - It should do: {{what_it_should_do}}
      - Because: {{why_the_current_behavior_is_wrong}}

      ## Execution Trace
      1. Input enters at: {{entry_point}}
      2. Passes through: {{intermediate_steps}}
      3. Fails at: {{failure_point}}
      4. Error propagates to: {{where_user_sees_error}}

      ## Sibling Bugs
      - {{file_with_similar_pattern}} — Same pattern, {{is/is_not}} affected
      ...

      ## Fix Strategy
      {{how_to_fix — specific code changes needed}}

      ## Fix Complexity: LOW / MEDIUM / HIGH
      {{explain_complexity}}
      ```

      Rules:
      - Find the ROOT cause, not just the symptom
      - Always check for sibling bugs (same pattern, different location)
      - Be specific about the fix — exact file, line, and change
      - If the root cause is in a dependency, say so and suggest alternatives
    verification: |
      Root cause analysis must:
      - [ ] Identify specific file(s) and line(s) where the bug originates
      - [ ] Distinguish root cause from symptoms
      - [ ] Include an execution trace
      - [ ] Check for sibling bugs in the codebase
      - [ ] Propose a specific fix strategy

  - id: fix
    agent: codex
    depends_on: [isolate]
    timeout_ms: 300000
    retries: 2
    prompt: |
      You are a developer fixing a bug with a known root cause.

      Root cause analysis:
      {{isolate.output}}

      Failing test from reproduction:
      {{reproduce.output}}

      Your job:
      1. **Fix the root cause** — Apply the minimal change that fixes the bug
      2. **Fix sibling bugs** — If the analysis found similar patterns, fix those too
      3. **Make the failing test pass** — The reproduction test must now pass
      4. **Do not break anything else** — Existing tests must still pass

      Rules:
      - MINIMAL fix — change the least amount of code possible
      - Fix the root cause, not the symptom (no workarounds)
      - If sibling bugs were identified, fix them in the same change
      - Preserve existing behavior for all non-buggy cases
      - Add a code comment only if the fix is non-obvious
      - Use immutable patterns (return new objects, don't mutate)
      - No console.log in the fix

      Output format:
      ```markdown
      # Bug Fix: {{bug_title}}

      ## Changes Made
      ### {{file_1}}
      - Line {{N}}: Changed {{what}} because {{why}}

      ### {{file_2}} (sibling fix)
      - Line {{N}}: Changed {{what}} because {{why}}

      ## Files Modified
      (full content of each modified file)
      ```
    verification: |
      Fix must:
      - [ ] The previously-failing reproduction test now passes
      - [ ] All existing tests still pass
      - [ ] TypeScript compiles without errors
      - [ ] Sibling bugs (if any) are also fixed
      - [ ] Change is minimal (no unrelated refactoring)

  - id: verify
    agent: claude-haiku
    depends_on: [fix]
    timeout_ms: 180000
    retries: 2
    prompt: |
      You are a QA engineer verifying a bug fix.

      Original bug:
      {{reproduce.output}}

      Root cause:
      {{isolate.output}}

      Applied fix:
      {{fix.output}}

      Your job:
      1. **Run the reproduction test** — Confirm it now passes
      2. **Run the full test suite** — Confirm nothing is broken
      3. **Run type checks** — Confirm TypeScript is clean
      4. **Manual spot check** — Read the fixed code and verify the logic is correct
      5. **Edge case check** — Test boundary conditions related to the bug

      Output format:
      ```markdown
      # Fix Verification: {{bug_title}}

      ## Reproduction Test
      Status: PASS / FAIL
      Output: {{test_output}}

      ## Full Test Suite
      Status: PASS / FAIL
      Results: {{X}} passing, {{Y}} failing
      {{details_of_any_failures}}

      ## Type Check
      Status: PASS / FAIL
      {{any_type_errors}}

      ## Manual Review
      The fix correctly addresses the root cause: YES / NO
      Reasoning: {{explain}}

      ## Edge Cases Tested
      - {{edge_case_1}}: PASS / FAIL
      - {{edge_case_2}}: PASS / FAIL

      ## Verdict: VERIFIED / NOT VERIFIED
      {{reasoning}}
      ```

      Rules:
      - Actually run the tests — do not assume they pass
      - If any test fails, report the exact failure and output
      - Check edge cases even if the main test passes
      - VERIFIED only if ALL checks pass
    verification: |
      Verification must:
      - [ ] Reproduction test actually run and passing
      - [ ] Full test suite run results included
      - [ ] Type check results included
      - [ ] At least 2 edge cases tested
      - [ ] Clear VERIFIED or NOT VERIFIED verdict

  - id: regression-test
    agent: claude-haiku
    depends_on: [verify]
    timeout_ms: 180000
    retries: 1
    prompt: |
      You are a QA engineer writing regression tests to prevent this bug from recurring.

      Original bug:
      {{reproduce.output}}

      Root cause:
      {{isolate.output}}

      Applied fix:
      {{fix.output}}

      Your job:
      1. **Write focused regression tests** that will catch this exact bug if it's ever reintroduced
      2. **Write guard tests** for the sibling patterns identified in isolation
      3. **Name tests descriptively** so future developers understand what they protect

      For each regression test:
      - Name: `it('should <expected_behavior> when <condition>')`
      - Test the specific input that triggered the bug
      - Test the boundary conditions around the fix
      - Include a brief comment explaining which bug this prevents

      Output format:
      ```markdown
      # Regression Tests: {{bug_title}}

      ## New Tests Added
      ### {{test_file}}
      ```typescript
      // full test content
      ```

      ## Test Run Results
      All new tests: PASS / FAIL
      Full suite: {{X}} passing, {{Y}} failing

      ## Coverage Impact
      Before: {{before}}%
      After: {{after}}%
      ```

      Rules:
      - Every regression test must have a comment referencing the original bug
      - Tests must be specific enough to catch the exact regression
      - Tests must not be fragile or dependent on implementation details
      - Run all tests (new + existing) and report results
    verification: |
      Regression tests must:
      - [ ] At least 2 new tests specific to this bug
      - [ ] Tests for sibling patterns (if any were found)
      - [ ] All new tests pass
      - [ ] All existing tests still pass
      - [ ] Tests are named descriptively
