name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Airplane mode test
        run: MCP_DISABLED=1 node --test tests/airplane-mode.test.js

      - name: Check shell syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh

      - name: Check JS syntax
        run: |
          for f in hooks/*.js; do
            node --check "$f"
          done
          for f in commander/*.js; do
            node --check "$f"
          done
          for f in commander/integrations/*.js; do
            node --check "$f"
          done
          node --check bin/kc.js

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks/hooks-standalone.json', 'utf8'))"
          for f in commander/adventures/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
          done

      - name: Lint
        run: npx eslint . --max-warnings 150

      - name: Run Intelligence tests
        run: node --test commander/tests/intelligence.test.js

      - name: Run error handling tests
        run: node --test commander/tests/error-handling.test.js

      - name: Run self-test
        run: node bin/kc.js --test

      - name: Run hook tests
        run: node --test tests/hooks.test.js

      - name: Run path tests
        run: node --test commander/tests/paths.test.js

      - name: Run tmux menu crash audit
        run: node --test commander/tests/tmux-menu-audit.test.js

      - name: Run claude-finder tests
        run: node --test commander/tests/claude-finder.test.js

      - name: Run TUI visual tests
        run: node --test commander/tests/tui-visual.test.js

      - name: Run dispatch security tests
        run: node --test commander/tests/dispatch-security.test.js

      - name: Run audit-counts tests
        run: node --test commander/tests/audit-counts.test.js

      - name: Run vendor + orchestrator tests
        run: node --test commander/tests/vendor-scanner.test.js commander/tests/orchestrator.test.js

      - name: Verify no secrets
        run: |
          if grep -rn 'sk-[a-zA-Z0-9]\{20\}\|ghp_[a-zA-Z0-9]\{36\}' --include='*.js' --include='*.json' --include='*.md' --exclude-dir=vendor --exclude-dir=node_modules .; then
            echo "ERROR: Possible secrets found"
            exit 1
          fi

      - name: PII scan
        run: |
          if grep -rn '6418588155\|1477872497599840369\|1480676421457416306\|d852cff2\|k3v80\|/Users/ai/' \
            --include='*.md' --include='*.js' --include='*.html' \
            --exclude-dir=vendor --exclude-dir=node_modules --exclude-dir=.git \
            --exclude-dir=coverage --exclude-dir=kevin --exclude-dir=docs \
            --exclude='CHANGELOG.md' .; then
            echo "PII DETECTED IN PUBLIC FILES"
            exit 1
          fi

      - name: Verify skill structure
        run: |
          count=$(find skills -name 'SKILL.md' | wc -l | tr -d ' ')
          echo "Found $count skills with SKILL.md"
          if [ "$count" -lt 100 ]; then
            echo "ERROR: Expected 100+ skills, found $count"
            exit 1
          fi

      - name: Doc sync check
        run: node bin/doc-sync.js

      - name: Verify doc counts
        run: node scripts/audit-counts.js --check
