  <!-- Item 1 -->
  <rect x="702" y="306" width="440" height="36" rx="4" fill="#3fb950" fill-opacity="0.06"/>
  <text x="720" y="329" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="329" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">Guided menu (arrow keys)</text>
  <text x="1000" y="326" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">no commands</text>

  <!-- Item 2 -->
