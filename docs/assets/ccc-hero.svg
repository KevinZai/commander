<circle cx="85" cy="280" r="6" fill="#ffbd2e"/>
<circle cx="105" cy="280" r="6" fill="#27c93f"/>
<text x="460" y="284" text-anchor="middle" fill="#555" font-family="'SF Mono','Fira Code',monospace" font-size="11">ccc - CC Commander v2.0.0</text>

