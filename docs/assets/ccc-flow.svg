" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">8-STEP PIPELINE</text><text x="640" y="195" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">WHAT YOU GET</text><line x1="60" y1="201" x2="240" y2="201" stroke="#333" stroke-width="1"/><line x1="340" y1="201" x2="540" y2="201" stroke="#333" stroke-width="1"/><line x1="640" y1="201" x2="820" y2="201" stroke="#333" stroke-width="1"/><text x="60" y="219" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Asks smart questions</text><text x="60" y="241" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Picks the right model</text><text x="60" y="263" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Sets cost ceiling</text><text x="60" y="285" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Detects your plugins</text><text x="60" y="307" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Injects past lessons</text><text x="60" y="329" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Tracks every session</text><text x="60" y="351" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Compounds knowledge</text><text x="60" y="373" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Guides non-coders</text><text x="340" y="219" fill="#ff0080" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">1 Clarify</text><text x="420" y="219" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /office-hours</text><text x="340" y="241" fill="#ff0080" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">2 Decide</text><text x="420" y="241" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /plan-ceo-review</text><text x="340" y="263" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">3 Plan</text><text x="420" y="263" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /ce:plan</text><text x="340" y="285" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">4 Execute</text><text x="420" y="285" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /ce:work</text><text x="340" y="307" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">5 Review</text><text x="420" y="307" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /ce:review (6+)</text><text x="340" y="329" fill="#27c93f" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">6 Test</text><text x="420" y="329" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /qa (browser)</text><text x="340" y="351" fill="#27c93f" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">7 Learn</text><text x="420" y="351" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /knowledge base</text><text x="340" y="373" fill="#27c93f" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" xml:space="preserve">8 Ship</text><text x="420" y="373" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">─▸ /git commit</text><text x="6