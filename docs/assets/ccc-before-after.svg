  <rect x="60" y="224" width="440" height="70" rx="4" fill="#0a0d12" stroke="#30363d" stroke-width="1"/>
  <text x="76" y="248" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="11" fill="#6e7681">$ claude</text>
  <text x="76" y="265" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="11" fill="#8b949e">Welcome to Claude Code!</text>
  <text x="76" y="282" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="11" fill="#e6edf3">&gt; <text font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" fill="#da3633">▊</text></text>
  <text x="210" y="282" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">  ← blank. no guidance.</text>

  <!-- Left panel items -->
  <!-- Item 1 -->
  <rect x="60" y="306" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.06"/>
  <text x="78" y="329" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="329" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">Blank terminal</text>
  <text x="102" y="335" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="0" fill="none"/>
  <text x="350" y="326" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">zero UX</text>

  <!-- Item 2 -->
  <rect x="60" y="348" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.03"/>
  <text x="78" y="371" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="371" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">No skills installed</text>
  <text x="350" y="368" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">start from scratch</text>

  <!-- Item 3 -->
  <rect x="60" y="390" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.06"/>
  <text x="78" y="413" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="413" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">No memory</text>
  <text x="350" y="410" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">amnesia on exit</text>

  <!-- Item 4 -->
  <rect x="60" y="432" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.03"/>
  <text x="78" y="455" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="455" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">Starts fresh every time</text>
  <text x="350" y="452" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">no resume</text>

  <!-- Item 5 -->
  <rect x="60" y="474" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.06"/>
  <text x="78" y="497" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="497" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">Raw output (wastes context)</text>
  <text x="350" y="494" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#da3633">98% waste</text>

  <!-- Item 6 -->
  <rect x="60" y="516" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.03"/>
  <text x="78" y="539" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="539" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">No project awareness</text>
  <text x="350" y="536" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">no stack detect</text>

  <!-- Item 7 -->
  <rect x="60" y="558" width="440" height="36" rx="4" fill="#da3633" fill-opacity="0.06"/>
  <text x="78" y="581" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#da3633">○</text>
  <text x="102" y="581" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">No error handling</text>
  <text x="350" y="578" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">crash = lost work</text>

