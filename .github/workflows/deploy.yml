name: Deploy (v4 Beta)

on:
  push:
    branches: [main]
    paths:
      - 'apps/mcp-server-cloud/**'
      - 'site/**'
      - 'supabase/**'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - name: Install deps
        run: npm ci --prefer-offline --no-audit
      - name: Full test suite
        run: |
          npm test
          node bin/kc.js --test
          bash tests/smoke.sh
      - name: Registry drift
        run: node scripts/build-from-registry.js --check

  deploy-mcp:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy MCP cloud (canary)
        working-directory: apps/mcp-server-cloud
        run: flyctl deploy --strategy canary --app cc-commander-mcp --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS --max-time 2 https://mcp.cc-commander.com/health; then exit 0; fi
            sleep 2
          done
          exit 1

  deploy-site:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - name: Install site deps
        working-directory: site
        run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel
        working-directory: site
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  post-deploy-smoke:
    needs: [deploy-mcp, deploy-site]
    runs-on: ubuntu-latest
    steps:
      - name: Site probe
        run: curl -fsS --max-time 5 https://cc-commander.com > /dev/null
      - name: MCP health probe
        run: curl -fsS --max-time 5 https://mcp.cc-commander.com/health > /dev/null
