  <text x="600" y="648" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="18" font-weight="bold" fill="#e6edf3">The same Claude Code. Infinitely better configured.</text>

  <!-- Three highlights -->
  <rect x="160" y="660" width="180" height="26" rx="13" fill="#da3633" fill-opacity="0.1" stroke="#da3633" stroke-width="1"/>
