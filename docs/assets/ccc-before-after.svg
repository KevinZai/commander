  <text x="718" y="248" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="11" fill="#6e7681">$ ccc</text>
  <rect x="706" y="253" width="432" height="18" rx="2" fill="#58a6ff" fill-opacity="0.15"/>
  <text x="718" y="266" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="11" fill="#58a6ff">▸ New Feature</text>
  <text x="856" y="266" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">Fix Bug  Review  Deploy  Settings</text>
  <text x="718" y="282" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#6e7681">↑↓ arrow keys  Enter select  ? help</text>

