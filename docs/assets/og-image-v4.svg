<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#2e1065;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="statbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)" rx="0" />

  <!-- Left purple glow blob -->
  <ellipse cx="120" cy="315" rx="200" ry="180" fill="#7c3aed" opacity="0.08" />

  <!-- Right glow blob -->
  <ellipse cx="1080" cy="315" rx="180" ry="160" fill="#a855f7" opacity="0.06" />

  <!-- Plugin badge -->
  <rect x="72" y="72" width="220" height="34" rx="17" fill="url(#accent)" opacity="0.9" />
  <text x="182" y="94" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">CLAUDE CODE PLUGIN</text>

  <!-- Main headline -->
  <text x="72" y="198" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">CC Commander</text>
  <text x="74" y="252" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="32" font-weight="400" fill="#c4b5fd" letter-spacing="0">v4.0  for Claude Code Desktop &amp; Cowork</text>

  <!-- Divider -->
  <rect x="72" y="278" width="500" height="2" fill="url(#accent)" rx="1" opacity="0.6" />

  <!-- Subhead -->
  <text x="72" y="322" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="22" font-weight="400" fill="#e9d5ff" opacity="0.9">Guided AI PM. Click-first workflows. Free forever.</text>

  <!-- Stats row -->
  <rect x="72" y="368" width="1056" height="76" rx="12" fill="url(#statbar)" />
  <rect x="72" y="368" width="1056" height="76" rx="12" stroke="#7c3aed" stroke-width="1" fill="none" opacity="0.3" />

  <!-- Stat: skills -->
  <text x="162" y="400" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="30" font-weight="700" fill="#a855f7" text-anchor="middle">30+</text>
  <text x="162" y="423" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="13" font-weight="400" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.5">skills</text>

  <!-- Divider -->
  <rect x="266" y="385" width="1" height="46" fill="#7c3aed" opacity="0.4" />

  <!-- Stat: agents -->
  <text x="366" y="400" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="30" font-weight="700" fill="#a855f7" text-anchor="middle">17</text>
  <text x="366" y="423" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="13" font-weight="400" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.5">sub-agents</text>

  <!-- Divider -->
  <rect x="470" y="385" width="1" height="46" fill="#7c3aed" opacity="0.4" />

  <!-- Stat: hooks -->
  <text x="560" y="400" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="30" font-weight="700" fill="#a855f7" text-anchor="middle">8</text>
  <text x="560" y="423" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="13" font-weight="400" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.5">lifecycle hooks</text>

  <!-- Divider -->
  <rect x="658" y="385" width="1" height="46" fill="#7c3aed" opacity="0.4" />

  <!-- Stat: MCP -->
  <text x="748" y="400" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="30" font-weight="700" fill="#a855f7" text-anchor="middle">9</text>
  <text x="748" y="423" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="13" font-weight="400" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.5">MCP servers</text>

  <!-- Divider -->
  <rect x="846" y="385" width="1" height="46" fill="#7c3aed" opacity="0.4" />

  <!-- Stat: free -->
  <text x="970" y="400" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="26" font-weight="700" fill="#34d399" text-anchor="middle">FREE</text>
  <text x="970" y="423" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="13" font-weight="400" fill="#6ee7b7" text-anchor="middle" letter-spacing="0.5">forever</text>

  <!-- Install hint -->
  <rect x="72" y="476" width="580" height="44" rx="8" fill="#0f0a1e" opacity="0.7" />
  <rect x="72" y="476" width="580" height="44" rx="8" stroke="#7c3aed" stroke-width="1" fill="none" opacity="0.5" />
  <text x="96" y="503" font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="15" fill="#a855f7">/plugin marketplace add</text>
  <text x="380" y="503" font-family="Menlo, Monaco, Consolas, Courier New, monospace" font-size="15" fill="#e9d5ff">KevinZai/commander</text>

  <!-- URL -->
  <text x="72" y="574" font-family="Helvetica Neue, Helvetica, SF Pro Display, Arial, sans-serif" font-size="15" font-weight="400" fill="#7c3aed" opacity="0.8">kevinzai.github.io/cc-commander</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)" rx="0" />
</svg>
