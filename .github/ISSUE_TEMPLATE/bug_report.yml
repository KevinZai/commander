name: Bug Report
description: Something is broken in CC Commander
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can.

  - type: input
    id: ccc_version
    attributes:
      label: CC Commander version
      description: Run `node bin/kc.js --status` or `ccc --version` and paste the output
      placeholder: "e.g. 4.0.0-beta.10"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Where does the bug occur?
      options:
        - Claude Code Desktop (Cowork Desktop)
        - Claude Code CLI (terminal)
        - Both
        - Other
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: "`node --version`"
      placeholder: "e.g. v22.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.3 / Ubuntu 22.04"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact sequence that triggers the bug
      placeholder: |
        1. Run `/ccc-start` in a new session
        2. Select "Build" from the menu
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, stack traces, or screenshots
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (relevant env vars, project type, etc.)
