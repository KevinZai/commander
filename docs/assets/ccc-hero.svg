<svg xmlns="http://www.w3.org/2000/svg" width="920" height="740">
<defs>
<linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#ff6600"/>
<stop offset="50%" style="stop-color:#ff0044"/>
<stop offset="100%" style="stop-color:#ffcc00"/>
</linearGradient>
<linearGradient id="fireh" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#ff6600"/>
<stop offset="100%" style="stop-color:#ffcc00"/>
</linearGradient>
<linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#ff0080"/>
<stop offset="100%" style="stop-color:#00ffff"/>
</linearGradient>
<linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#50ff78"/>
<stop offset="50%" style="stop-color:#00c8ff"/>
<stop offset="100%" style="stop-color:#b464ff"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="softglow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#08080c"/>

<!-- 3-LINE GRADIENT TITLE -->
<text x="460" y="65" text-anchor="middle" fill="url(#fire)" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="44" font-weight="bold" filter="url(#glow)" letter-spacing="10">CLAUDE</text>
<text x="460" y="115" text-anchor="middle" fill="url(#cyber)" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="44" font-weight="bold" filter="url(#glow)" letter-spacing="10">CODE</text>
<text x="460" y="165" text-anchor="middle" fill="url(#aurora)" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="44" font-weight="bold" filter="url(#glow)" letter-spacing="10">COMMANDER</text>

<!-- Tagline -->
<text x="460" y="200" text-anchor="middle" fill="#999" font-family="'SF Mono','Fira Code',monospace" font-size="13" letter-spacing="2">Every Claude Code tool. One install. Guided access. Auto-updated.</text>

<!-- Badge row -->
<rect x="120" y="215" width="90" height="22" rx="4" fill="#1a1a2e"/>
<text x="165" y="230" text-anchor="middle" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">432+ Skills</text>
<rect x="225" y="215" width="90" height="22" rx="4" fill="#1a1a2e"/>
<text x="270" y="230" text-anchor="middle" fill="#ff0080" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">11 Vendors</text>
<rect x="330" y="215" width="90" height="22" rx="4" fill="#1a1a2e"/>
<text x="375" y="230" text-anchor="middle" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">10 Themes</text>
<rect x="435" y="215" width="90" height="22" rx="4" fill="#1a1a2e"/>
<text x="480" y="230" text-anchor="middle" fill="#50ff78" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">78 Commands</text>
<rect x="540" y="215" width="90" height="22" rx="4" fill="#1a1a2e"/>
<text x="585" y="230" text-anchor="middle" fill="#ffcc00" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">v2.0.0</text>
<rect x="645" y="215" width="90" height="22" rx="4" fill="#1a1a2e"/>
<text x="690" y="230" text-anchor="middle" fill="#b464ff" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">MIT License</text>

