<text x="165" y="370" fill="#444" font-family="'SF Mono','Fira Code',monospace" font-size="11">|</text>
<text x="180" y="370" fill="#fff" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="bold">$2.14</text>
<text x="235" y="370" fill="#444" font-family="'SF Mono','Fira Code',monospace" font-size="11">|</text>
<text x="255" y="370" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="11">42K</text>
<text x="290" y="370" fill="#ff0044" font-family="'SF Mono','Fira Code',monospace" font-size="11">8K</text>
<text x="320" y="370" fill="#444" font-family="'SF Mono','Fira Code',monospace" font-size="11">|</text>
<text x="340" y="370" fill="#555" font-family="'SF Mono','Fira Code',monospace" font-size="11">3m12s</text>

<!-- Context meter -->
<text x="70" y="392" fill="#666" font-family="'SF Mono','Fira Code',monospace" font-size="10">CTX</text>
<rect x="100" y="383" width="130" height="11" rx="3" fill="#161b22"/>
<rect x="100" y="383" width="81" height="11" rx="3" fill="url(#fire)" opacity="0.85"/>
<text x="240" y="392" fill="#ff6600" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">62%</text>

