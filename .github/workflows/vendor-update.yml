name: vendor-update

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:  # manual trigger

jobs:
  update:
    name: Audit + update vendor submodules + open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Audit submodules + capture report
        id: audit
        run: |
          set -euo pipefail
          REPORT_FILE="$(mktemp)"
          echo "" > "$REPORT_FILE"
          UPDATED_COUNT=0
          UPDATED_LIST=""
          DATE_STR="$(date -u +%Y-%m-%d)"
          echo "date=$DATE_STR" >> "$GITHUB_OUTPUT"

          while IFS= read -r line; do
            # Skip empty lines and uninitialized submodules (lines starting with -)
            [ -z "$line" ] && continue
            case "$line" in
              -*) continue ;;
            esac

            # Extract path (second field) — works for both " sha path (ref)" and "+sha path (ref)"
            SUB_PATH=$(echo "$line" | awk '{print $2}')
            [ -z "$SUB_PATH" ] && continue
            [ ! -d "$SUB_PATH" ] && continue

            (
              cd "$SUB_PATH"
              OLD_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
              git fetch --quiet origin 2>/dev/null || git fetch --quiet || true
              DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@' || echo main)
              NEW_SHA=$(git rev-parse --short "origin/$DEFAULT_BRANCH" 2>/dev/null || echo "$OLD_SHA")
              echo "$SUB_PATH|$OLD_SHA|$NEW_SHA|$DEFAULT_BRANCH"
            ) >> "$REPORT_FILE" || true
          done < <(git submodule status)

          # Build PR body
          {
            echo "## Vendor submodule audit — $DATE_STR"
            echo ""
            echo "| Submodule | Old SHA | New SHA | Compare |"
            echo "|-----------|---------|---------|---------|"
          } > pr-body.md

          while IFS='|' read -r sub_path old_sha new_sha branch; do
            [ -z "$sub_path" ] && continue
            if [ "$old_sha" != "$new_sha" ] && [ "$new_sha" != "unknown" ]; then
              # Get remote URL for compare link
              REMOTE_URL=$(git -C "$sub_path" config --get remote.origin.url 2>/dev/null || echo "")
              # Normalise SSH URL to HTTPS for compare link
              COMPARE_URL=$(echo "$REMOTE_URL" | sed -e 's@^git@@' -e 's@^:@https://@' -e 's@\.git$@@' -e 's@^git+@@')
              if [ -n "$COMPARE_URL" ]; then
                COMPARE="[${old_sha}...${new_sha}](${COMPARE_URL}/compare/${old_sha}...${new_sha})"
              else
                COMPARE="${old_sha}...${new_sha}"
              fi
              echo "| \`$sub_path\` | \`$old_sha\` | \`$new_sha\` | $COMPARE |" >> pr-body.md

              # Apply the update
              if git submodule update --remote --rebase "$sub_path"; then
                git add "$sub_path"
                git commit -m "chore(vendor): update $(basename "$sub_path") ${old_sha}..${new_sha}" || true
                UPDATED_COUNT=$((UPDATED_COUNT + 1))
                UPDATED_LIST="$UPDATED_LIST $(basename "$sub_path")"
              fi
            fi
          done < "$REPORT_FILE"

          {
            echo ""
            echo "**Submodules updated:** $UPDATED_COUNT"
            echo ""
            echo "Generated by \`.github/workflows/vendor-update.yml\` — this PR is opened weekly. Review and merge if the changes are clean; close if not."
          } >> pr-body.md

          echo "updated_count=$UPDATED_COUNT" >> "$GITHUB_OUTPUT"
          echo "updated_list=$UPDATED_LIST" >> "$GITHUB_OUTPUT"

      - name: Run sanity audits
        if: steps.audit.outputs.updated_count != '0'
        run: |
          node scripts/audit-frontmatter.js --check
          node scripts/audit-counts.js --check

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet HEAD~${{ steps.audit.outputs.updated_count }} 2>/dev/null && [ "${{ steps.audit.outputs.updated_count }}" = "0" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with vendor updates
        if: steps.audit.outputs.updated_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: vendor/weekly-update-${{ steps.audit.outputs.date }}
          delete-branch: true
          title: "chore(vendor): weekly submodule update ${{ steps.audit.outputs.date }}"
          body-path: pr-body.md
          labels: |
            vendor:auto
            dependencies
          commit-message: |
            chore(vendor): weekly submodule update ${{ steps.audit.outputs.date }}
