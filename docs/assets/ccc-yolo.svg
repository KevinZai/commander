<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ff0080"/><stop offset="100%" style="stop-color:#00ffff"/></linearGradient><linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#ff0080"/><stop offset="100%" style="stop-color:#00ffff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="100%" height="100%" rx="10" fill="#0d1117"/><circle cx="20" cy="16" r="5" fill="#ff5f56"/><circle cx="36" cy="16" r="5" fill="#ffbd2e"/><circle cx="52" cy="16" r="5" fill="#27c93f"/><text x="460" text-anchor="middle" filter="url(#glow)" y="42" fill="url(#g1)" font-family="'SF Mono','Fira Code',monospace" font-size="18" font-weight="bold" xml:space="preserve">Y O L O   M O D E</text><text x="460" text-anchor="middle" y="62" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">Start before bed. Wake up to shipped code.</text><rect x="40" y="80" width="400" height="230" rx="6" fill="none" stroke="#ff0080" stroke-width="1.5"/><text x="60" y="105" fill="#ff0080" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="bold" xml:space="preserve">10 QUESTIONS</text><text x="60" y="125" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">1. What are you building?</text><text x="60" y="145" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">2. Who is it for?</text><text x="60" y="165" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">3. Most critical feature?</text><text x="60" y="185" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">4. Tech stack?</text><text x="60" y="205" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">5. What does DONE look like?</text><text x="60" y="225" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">6. What does BROKEN look like?</text><text x="60" y="245" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">7. Edge cases?</text><text x="60" y="265" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">8. Testing requirements?</text><text x="60" y="285" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">9. Deployment target?</text><text x="60" y="305" fill="#bbb" font-family="'SF Mono','Fira Code',monospace" font-size="10.5" xml:space="preserve">10. Anything else?</text><text x="460" text-anchor="middle" y="200" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="16" font-weight="bold" xml:space="preserve">──▸</text><rect x="480" y="80" width="400" height="130" rx="6" fill="none" stroke="#00ffff" stroke-width="1.5"/><text x="500" y="105" fill="#00ffff" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="bold" xml:space="preserve">DISPATCH</text><text x="500" y="130" fill="#ddd" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Opus · max effort</text><text x="500" y="152" fill="#ddd" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ $10 budget · 100 turns</text><text x="500" y="174" fill="#ddd" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Self-testing · plan mode</text><text x="500" y="196" fill="#ddd" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">▸ Knowledge extraction</text><rect x="480" y="220" width="400" height="90" rx="6" fill="none" stroke="#27c93f" stroke-width="1.5"/><text x="500" y="245" fill="#27c93f" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="bold" xml:space="preserve">YOLO LOOP</text><text x="500" y="268" fill="#ddd" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">build ──▸ review ──▸ improve ──╮</text><text x="500" y="288" fill="#ddd" font-family="'SF Mono','Fira Code',monospace" font-size="11" xml:space="preserve">  ╰─────────────────────────────╯</text><text x="500" y="305" fill="#888" font-family="'SF Mono','Fira Code',monospace" font-size="10" xml:space="preserve">3-10 cycles until perfect</text></svg>