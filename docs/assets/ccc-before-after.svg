  <text x="720" y="371" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="371" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">450+ skills loaded</text>
  <text x="1000" y="368" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">tiered</text>

  <!-- Item 3 -->
  <rect x="702" y="390" width="440" height="36" rx="4" fill="#3fb950" fill-opacity="0.06"/>
  <text x="720" y="413" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="413" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">Knowledge compounds</text>
  <text x="1000" y="410" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">gets smarter</text>

  <!-- Item 4 -->
  <rect x="702" y="432" width="440" height="36" rx="4" fill="#3fb950" fill-opacity="0.03"/>
  <text x="720" y="455" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="455" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">Session resume (--session-id)</text>
  <text x="1000" y="452" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">no loss</text>

  <!-- Item 5 -->
  <rect x="702" y="474" width="440" height="36" rx="4" fill="#3fb950" fill-opacity="0.06"/>
  <text x="720" y="497" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="497" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">98% context savings</text>
  <text x="1000" y="494" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#ff6600">caveman mode</text>

  <!-- Item 6 -->
  <rect x="702" y="516" width="440" height="36" rx="4" fill="#3fb950" fill-opacity="0.03"/>
  <text x="720" y="539" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="539" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">Auto-detects stack</text>
  <text x="1000" y="536" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">pkg.json etc</text>

  <!-- Item 7 -->
  <rect x="702" y="558" width="440" height="36" rx="4" fill="#3fb950" fill-opacity="0.06"/>
  <text x="720" y="581" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950">●</text>
  <text x="744" y="581" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3">Friendly errors + return to menu</text>
  <text x="1000" y="578" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#3fb950">never lost</text>

  <!-- Right score badge -->
