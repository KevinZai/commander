<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#130d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1a0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#ff6600"/>

  <!-- Header -->
  <text x="600" y="46" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="12" fill="#ff6600" letter-spacing="4">CC COMMANDER</text>
  <text x="600" y="82" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="28" font-weight="bold" fill="#e6edf3" filter="url(#glow)">Stock Claude Code vs CC Commander</text>
  <text x="600" y="108" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">One install. Everything changes.</text>

  <!-- Divider -->
  <line x1="60" y1="124" x2="1140" y2="124" stroke="#21262d" stroke-width="1"/>

  <!-- ═══════════════════════════════════ -->
  <!-- LEFT PANEL — Stock Claude Code -->
  <!-- ═══════════════════════════════════ -->
  <rect x="40" y="138" width="478" height="460" rx="8" fill="url(#leftGrad)" stroke="#da3633" stroke-width="1.5"/>

  <!-- Left panel top tint overlay -->
  <rect x="40" y="138" width="478" height="460" rx="8" fill="#ff0000" fill-opacity="0.04"/>

  <!-- Left panel header -->
  <rect x="40" y="138" width="478" height="48" rx="8" fill="#da3633" fill-opacity="0.2"/>
  <rect x="40" y="166" width="478" height="20" fill="#da3633" fill-opacity="0.2"/>

  <!-- Traffic lights -->
  <circle cx="68" cy="162" r="7" fill="#ff5f57"/>
  <circle cx="90" cy="162" r="7" fill="#ffbd2e"/>
  <circle cx="112" cy="162" r="7" fill="#28c841" fill-opacity="0.4"/>

  <text x="279" y="168" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="13" font-weight="bold" fill="#da3633">Stock Claude Code</text>

  <!-- Version tag -->
  <rect x="68" y="196" width="100" height="18" rx="3" fill="#da3633" fill-opacity="0.2" stroke="#da3633" stroke-width="1" stroke-opacity="0.4"/>
  <text x="118" y="208" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="10" fill="#da3633">vanilla install</text>

