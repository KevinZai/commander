# Fly.io configuration for CC Commander MCP server
# Kevin: run `fly apps create cc-commander-mcp --org personal` before first deploy
# Secrets set via: fly secrets set KEY=value
# OP vault refs:
#   op://Alfred/cc-commander-supabase/url
#   op://Alfred/cc-commander-supabase/service-role-key
#   op://Alfred/cc-commander-upstash/url
#   op://Alfred/cc-commander-upstash/token
#   op://Alfred/cc-commander-jwt/secret
#   op://Alfred/cc-commander-posthog/api-key

app = "cc-commander-mcp"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  count = 1
  size = "shared-cpu-1x"
  memory = "512mb"

[processes]
  app = "node dist/index.js"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[deploy]
  release_command = "node -e 'console.log(\"deploy check: ok\")'"
  strategy = "canary"
