<svg xmlns="http://www.w3.org/2000/svg" width="920" height="700"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:rgb(255,0,128);stop-opacity:1" /><stop offset="100%" style="stop-color:rgb(0,255,255);stop-opacity:1" /></linearGradient><linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:rgb(0,255,255);stop-opacity:0.3" /><stop offset="100%" style="stop-color:rgb(255,0,128);stop-opacity:0.3" /></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="100%" height="100%" rx="12" fill="#0d1117"/><text x="460" y="40" fill="url(#grad1)" font-family="'SF Mono', monospace" font-size="20" font-weight="bold" text-anchor="middle" filter="url(#glow)">HOW CLAUDE CODE COMMANDER WORKS</text><text x="460" y="62" fill="#666" font-family="monospace" font-size="12" text-anchor="middle">Your AI project manager sits ABOVE Claude Code — not inside it</text><rect x="340" y="90" width="240" height="50" rx="8" fill="none" stroke="#27c93f" stroke-width="2"/><text x="460" y="120" fill="#27c93f" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">👤 YOU</text><text x="460" y="138" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">answer questions · pick from menus</text><line x1="460" y1="140" x2="460" y2="170" stroke="#27c93f" stroke-width="2" marker-end="url(#arr)"/><polygon points="455,168 460,178 465,168" fill="#27c93f"/><rect x="120" y="180" width="680" height="280" rx="12" fill="#0d1117" stroke="url(#grad1)" stroke-width="2"/><text x="460" y="210" fill="url(#grad1)" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle" filter="url(#glow)">CLAUDE CODE COMMANDER</text><text x="180" y="240" fill="#0ff" font-family="monospace" font-size="11" font-weight="bold">WHAT IT DOES</text><text x="180" y="260" fill="#aaa" font-family="monospace" font-size="11">❯ Asks smart questions</text><text x="180" y="282" fill="#aaa" font-family="monospace" font-size="11">❯ Picks the right model</text><text x="180" y="304" fill="#aaa" font-family="monospace" font-size="11">❯ Sets cost ceiling</text><text x="180" y="326" fill="#aaa" font-family="monospace" font-size="11">❯ Detects your plugins</text><text x="180" y="348" fill="#aaa" font-family="monospace" font-size="11">❯ Injects past lessons</text><text x="180" y="370" fill="#aaa" font-family="monospace" font-size="11">❯ Tracks every session</text><text x="180" y="392" fill="#aaa" font-family="monospace" font-size="11">❯ Compounds knowledge</text><text x="430" y="240" fill="#0ff" font-family="monospace" font-size="11" font-weight="bold">THE 8-STEP PIPELINE</text><text x="430" y="260" fill="#ff0080" font-family="monospace" font-size="11">1 Clarify    ─▸ /office-hours</text><text x="430" y="282" fill="#ff0080" font-family="monospace" font-size="11">2 Decide     ─▸ /plan-ceo-review</text><text x="430" y="304" fill="#0ff" font-family="monospace" font-size="11">3 Plan       ─▸ /ce:plan</text><text x="430" y="326" fill="#0ff" font-family="monospace" font-size="11">4 Execute    ─▸ /ce:work</text><text x="430" y="348" fill="#0ff" font-family="monospace" font-size="11">5 Review     ─▸ /ce:review (6+)</text><text x="430" y="370" fill="#27c93f" font-family="monospace" font-size="11">6 Test       ─▸ /qa (browser)</text><text x="430" y="392" fill="#27c93f" font-family="monospace" font-size="11">7 Learn      ─▸ knowledge base</text><text x="430" y="414" fill="#27c93f" font-family="monospace" font-size="11">8 Ship       ─▸ git commit</text><text x="700" y="240" fill="#0ff" font-family="monospace" font-size="11" font-weight="bold">RESULT</text><text x="700" y="260" fill="#aaa" font-family="monospace" font-size="11">280+ skills</text><text x="700" y="282" fill="#aaa" font-family="monospace" font-size="11">10 mega-skills</text><text x="700" y="304" fill="#aaa" font-family="monospace" font-size="11">88+ commands</text><text x="700" y="326" fill="#aaa" font-family="monospace" font-size="11">37 hooks</text><text x="700" y="348" fill="#aaa" font-family="monospace" font-size="11">4 themes</text><text x="700" y="370" fill="#aaa" font-family="monospace" font-size="11">YOLO Mode</text><text x="700" y="392" fill="#aaa" font-family="monospace" font-size="11">Linear agent</text><polygon points="455,458 460,468 465,458" fill="#0ff"/><rect x="160" y="480" width="600" height="60" rx="8" fill="none" stroke="#0ff" stroke-width="1.5" stroke-dasharray="6,3"/><text x="460" y="505" fill="#0ff" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">CLAUDE CODE SESSIONS</text><text x="460" y="525" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">claude -p "task" --bare --plan --effort high --budget $5 --model opusplan</text><rect x="220" y="560" width="140" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="290" y="582" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">Session 1</text><rect x="400" y="560" width="140" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="470" y="582" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">Session 2</text><rect x="580" y="560" width="140" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="650" y="582" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">Session N</text><path d="M 780 510 Q 830 510 830 400 Q 830 300 780 300" fill="none" stroke="#ff0080" stroke-width="1.5" stroke-dasharray="4,2"/><polygon points="782,296 778,304 786,304" fill="#ff0080"/><text x="845" y="400" fill="#ff0080" font-family="monospace" font-size="10" transform="rotate(90, 845, 400)" text-anchor="middle">knowledge compounds ↑</text><text x="460" y="625" fill="#444" font-family="monospace" font-size="11" text-anchor="middle">Your .claude/ directory is NEVER modified — CCC is an overlay</text><text x="460" y="645" fill="url(#grad1)" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">ccc — three letters to manage your entire AI workflow</text><text x="460" y="670" fill="#555" font-family="monospace" font-size="10" text-anchor="middle">Claude Code Commander v1.6.0 — by Kevin Z — kevinz.ai</text></svg>