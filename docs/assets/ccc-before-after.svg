  <rect x="702" y="614" width="440" height="30" rx="4" fill="#3fb950" fill-opacity="0.1"/>
  <text x="921" y="634" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="12" fill="#3fb950">Experience score: ●●●●●●●●●●  10/10</text>

