name: weekly-vendor-sync

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # manual trigger

jobs:
  sync:
    name: Pull vendors + test + report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run weekly vendor sync
        id: sync
        run: |
          chmod +x scripts/weekly-vendor-sync.sh
          scripts/weekly-vendor-sync.sh | tee sync-output.log
          echo "updated_count=$(grep -oE '[0-9]+ vendor\(s\) updated' sync-output.log | head -1 | awk '{print $1}' || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with vendor updates
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ecosystem/weekly-vendor-sync
          delete-branch: true
          title: "chore(ecosystem): weekly vendor sync — ${{ steps.sync.outputs.updated_count }} vendor(s) updated"
          body: |
            Automated weekly vendor submodule sync.

            **Vendors updated:** ${{ steps.sync.outputs.updated_count }}

            Per `docs/ECOSYSTEM.md` 6-step contribution protocol, review this PR for:
            - New skills / hooks / agents in updated vendors — should any be promoted into the plugin?
            - Breaking changes — has any vendor introduced API changes that affect our integration?
            - Dependency drift — `npm audit` still clean?

            Full report: `output/dev/vendor-sync-reports/` (see committed files)

            Close without merging if no action needed; submodule refs will re-catch up next week.
          labels: |
            ecosystem:auto
            dependencies
          commit-message: |
            chore(ecosystem): weekly vendor sync

            Automated pull from submodule tracking branches. See PR body for review notes.
