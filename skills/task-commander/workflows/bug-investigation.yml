# Task Commander — Bug Investigation Workflow
# DAG: reproduce -> isolate -> fix -> verify -> regression-test
#
# Scope: P2-P7 bug investigations
# Follows the principle: reproduce first, understand second, fix third.
# The reproduce step is critical — if you cannot reproduce reliably,
# you cannot verify the fix. Never skip straight to fixing.

name: bug-investigation
description: Systematic bug investigation from reproduction through verified fix with regression tests
scope: P2-P7
cost_ceiling: 3.00

agents:
  investigator:
    model: sonnet
    role: "Bug reproduction and root cause isolation — the detective who finds the truth"
  fixer:
    model: sonnet
    role: "Minimal correct fix implementation — surgical precision, smallest possible change"
  tester:
    model: sonnet
    role: "Verification and regression test writing — ensures the fix holds permanently"
  verifier:
    model: haiku
    role: "Automated verification runner — executes tests and checks for regressions"

dag:
  - step: reproduce
    agent: investigator
    depends_on: []
    timeout_minutes: 5
    retries: 1
    prompt: |
      You are a bug investigator. Your ONLY job is to create a reliable reproduction
      of a reported bug. You do NOT fix anything in this step.

      **Bug report:**
      {{bug_description}}

      **Project:** {{project_name}} at {{project_path}}
      **Stack:** {{tech_stack}}
      **Reported by:** {{reporter}} on {{date}}
      **Severity:** {{severity}}
      **Environment:** {{environment_details}}

      Tasks:

      1. **Understand the bug** — Parse the bug report completely.
         - What is the expected behavior?
         - What is the actual behavior?
         - What are the exact steps to reproduce?
         - What is the frequency? (always, intermittent, specific conditions)

      2. **Find the relevant code** — Search the codebase for files involved.
         - Entry point (route handler, event listener, UI component)
         - Business logic files in the code path
         - Data layer (models, queries, schemas)
         - Configuration files that might affect behavior
         List every file that could be related.

      3. **Write a reproduction test** — Create a failing test that demonstrates the bug.
         Requirements for the test:
         - MUST fail on the current codebase (proving the bug exists)
         - MUST be deterministic (fails every time, not intermittently)
         - MUST be minimal (tests only the buggy behavior, nothing else)
         - Name format: "should {{expected_behavior}} when {{condition}}"
         - Use the project's test framework ({{test_framework}})

      4. **Document manual reproduction** — Write step-by-step instructions a human
         could follow to see the bug in action.

      Output format:
      ```markdown
      # Bug Reproduction: {{bug_title}}

      ## Summary
      - Expected: {{expected_behavior}}
      - Actual: {{actual_behavior}}
      - Frequency: {{always|intermittent|specific_conditions}}
      - Reproducible: YES | NO | PARTIAL

      ## Relevant Files
      | File | Role in Bug | Lines of Interest |
      |------|-------------|------------------|
      | {{path}} | {{why_relevant}} | {{line_range}} |

      ## Reproduction Test
      - File: {{test_file_path}}
      - Status: FAILING (confirms bug)
      ```typescript
      {{failing_test_code}}
      ```

      ## Test Output
      ```
      {{actual_failing_test_output}}
      ```

      ## Manual Reproduction Steps
      1. {{step_1}}
      2. {{step_2}}
      3. Observe: {{what_you_see}}
      4. Expected: {{what_should_happen}}
      ```

      Constraints:
      - The reproduction test MUST fail. If it passes, the bug is not reproduced.
      - If you CANNOT reproduce after thorough investigation, report status
        CANNOT_REPRODUCE with detailed explanation of what you tried.
      - Do NOT fix the bug. Do NOT modify source code. Only create test files.
      - Do NOT guess at the cause. Only document observable behavior.
    verification: |
      Reproduction must:
      - [ ] Include a failing test that demonstrates the bug
      - [ ] Test fails deterministically (run 3 times, fails 3 times)
      - [ ] List all relevant source files with specific line ranges
      - [ ] Document manual reproduction steps
      - [ ] NOT modify any source code

  - step: isolate
    agent: investigator
    depends_on: [reproduce]
    timeout_minutes: 5
    retries: 1
    prompt: |
      You are performing root cause analysis on a reproduced bug.

      **Reproduction results:**
      {{reproduce.output}}

      **Project:** {{project_name}} at {{project_path}}

      Tasks:

      1. **Trace the code path** — Follow execution from the entry point through
         to where the bug manifests. Document each function call in the chain
         with file:line references.

      2. **Identify the root cause** — Find the exact line(s) where the bug
         originates. Trace UPSTREAM from where the symptom appears to where
         the incorrect behavior is introduced.

      3. **Classify the bug type:**
         | Type | Description |
         |------|-------------|
         | Logic error | Wrong condition, off-by-one, missing case, wrong operator |
         | Type error | Wrong type, missing null check, incorrect cast, schema mismatch |
         | Race condition | Timing issue, async ordering, missing await, concurrent mutation |
         | Data corruption | Mutation of shared state, stale cache, reference vs value copy |
         | Integration error | Wrong API call, schema mismatch, encoding issue, version mismatch |
         | Configuration error | Wrong env var, missing config, wrong default, environment-specific |
         | Resource error | Connection pool, memory leak, file handle leak, rate limit |

      4. **Assess blast radius** — Search the entire codebase for sibling code
         that has the same pattern. Could this bug exist elsewhere?

      5. **Propose the minimal fix** — Describe the smallest correct change.
         Do NOT implement it.

      Output format:
      ```markdown
      # Root Cause Analysis: {{bug_title}}

      ## Code Path Trace
      1. {{entry_point}} ({{file}}:{{line}}) — {{description}}
      2. -> {{function}} ({{file}}:{{line}}) — {{description}}
      3. -> {{function}} ({{file}}:{{line}}) — {{description}}
      4. -> ROOT CAUSE: {{description}} ({{file}}:{{line}})

      ## Root Cause
      - **Type:** {{bug_classification}}
      - **Location:** {{file}}:{{line}}
      - **Explanation:** {{detailed_explanation}}
      - **Introduced by:** {{commit_or_date_if_identifiable}}

      ## Blast Radius
      | File:Line | Same Pattern? | Also Buggy? | Evidence |
      |-----------|--------------|-------------|----------|
      | {{path}}:{{line}} | Yes | {{Yes|No}} | {{why}} |

      ## Proposed Fix
      - **Approach:** {{minimal_fix_description}}
      - **Files to modify:** {{list_with_what_changes}}
      - **Lines to change:** {{specific_lines}}
      - **Risk of fix:** {{what_could_go_wrong}}
      - **Alternative approaches:** {{if_any}}
      ```

      Constraints:
      - Do NOT implement the fix. Only analyze and propose.
      - Root cause must reference a SPECIFIC file and line number.
      - Check for sibling bugs — same pattern elsewhere in the codebase.
      - If the root cause is unclear, list the top 2-3 hypotheses with evidence.
    verification: |
      Root cause analysis must:
      - [ ] Trace the full code path with file:line references
      - [ ] Identify the exact root cause location
      - [ ] Classify the bug type
      - [ ] Search for sibling occurrences of the same pattern
      - [ ] Propose a minimal fix without implementing it

  - step: fix
    agent: fixer
    depends_on: [isolate]
    timeout_minutes: 5
    retries: 2
    prompt: |
      You are implementing a surgical bug fix.

      **Root cause analysis:**
      {{isolate.output}}

      **Reproduction test (must PASS after your fix):**
      {{reproduce.output}}

      Tasks:

      1. **Implement the proposed fix** from the root cause analysis.
         Change the absolute minimum number of lines necessary.
      2. **Fix sibling bugs** identified in the blast radius analysis.
      3. **Run the reproduction test** — it must now PASS.
      4. **Run the existing test suite** — verify no regressions.

      Rules:
      - Minimal change only. Do NOT refactor surrounding code.
      - Do NOT change public API signatures unless the root cause requires it.
      - Use immutable patterns (return new objects, never mutate parameters).
      - Add a code comment only if the fix is non-obvious:
        `// Fix: {{bug_id}} — {{one_line_reason}}`
      - If the proposed fix from the analysis is wrong, explain why and implement
        a better fix with documented reasoning.
      - If existing tests break because of your fix, your fix is WRONG.
        Fix your implementation, never modify existing passing tests.

      Output format:
      ```markdown
      # Bug Fix: {{bug_title}}

      ## Changes Applied
      | File | Line(s) | Change | Reason |
      |------|---------|--------|--------|
      | {{path}} | {{lines}} | {{description}} | {{why}} |

      ## Sibling Fixes
      | File | Line(s) | Change | Same Pattern |
      |------|---------|--------|-------------|
      (or "None — no sibling bugs identified")

      ## Test Results
      - Reproduction test: PASS | FAIL
      - Existing test suite: {{passing}}/{{total}} passing
      - New failures: {{none|list}}

      ## File Diffs
      ### {{file_path}}
      ```diff
      {{diff_content}}
      ```
      ```

      Constraints:
      - Reproduction test MUST pass after your fix.
      - Existing test suite MUST have zero new failures.
      - If you cannot fix the bug, explain what is blocking you and request BLOCKED status.
    verification: |
      Fix must:
      - [ ] Make the reproduction test pass
      - [ ] Introduce zero new test failures
      - [ ] Apply minimal changes (diff should be small)
      - [ ] Fix sibling bugs if identified in root cause analysis
      - [ ] Not modify existing passing tests

  - step: verify
    agent: verifier
    depends_on: [fix]
    timeout_minutes: 3
    retries: 1
    prompt: |
      You are running automated verification on a bug fix.

      **Fix details:**
      {{fix.output}}

      **Project:** {{project_name}} at {{project_path}}
      **Test command:** {{test_command}}
      **Lint command:** {{lint_command}}

      Run this verification sequence in order:

      1. **TypeScript compilation:** `npx tsc --noEmit`
         - Must: zero errors
      2. **Full test suite:** `{{test_command}}`
         - Must: zero failures, note any skipped tests
      3. **Reproduction test only:** Run the specific reproduction test file
         - Must: PASS (confirming the bug is fixed)
      4. **Lint check:** `{{lint_command}}`
         - Must: zero new violations
      5. **Diff audit:** `git diff --stat`
         - Must: only expected files changed
         - Flag: any unexpected file modifications

      Output format:
      ```
      VERIFICATION: {{bug_title}}
      =============================
      TypeScript:     PASS | FAIL ({{error_count}} errors)
      Test suite:     PASS | FAIL ({{passing}}/{{total}}, {{skipped}} skipped)
      Reproduction:   PASS | FAIL
      Lint:           PASS | FAIL ({{violation_count}} violations)
      Diff audit:     CLEAN | SUSPICIOUS ({{unexpected_files}})

      Overall: VERIFIED | FAILED
      {{failure_details_if_any}}

      Files changed:
      {{git_diff_stat_output}}
      ```
    verification: |
      Verification must:
      - [ ] Run all 5 checks in order
      - [ ] Report PASS/FAIL for each with details
      - [ ] Flag unexpected file changes
      - [ ] Overall is VERIFIED only if ALL checks pass

  - step: regression-test
    agent: tester
    depends_on: [verify]
    timeout_minutes: 5
    retries: 1
    prompt: |
      You are writing regression tests to ensure this bug never returns.

      **Root cause analysis:**
      {{isolate.output}}

      **Fix applied:**
      {{fix.output}}

      **Verification results:**
      {{verify.output}}

      Tasks:

      1. **Expand the reproduction test** into a comprehensive regression suite:
         - The exact bug scenario (exists from reproduce step)
         - Boundary conditions around the fix:
           - Value just inside the boundary (should work)
           - Value just outside the boundary (should be handled correctly)
           - Value at the exact boundary (the original bug case)
         - Related scenarios exercising the same code path with different inputs
         - Sibling fix scenarios (if sibling bugs were fixed)

      2. **Add negative tests** for the failure mode:
         - Invalid inputs that should be rejected
         - Error conditions that should be handled gracefully
         - Combinations of inputs that stress the fixed code path

      3. **Document each test's purpose** with a comment explaining
         which aspect of the bug it guards against:
         ```typescript
         // Regression: {{bug_id}} — guards against {{specific_failure_mode}}
         it('should {{expected}} when {{condition}}', () => { ... })
         ```

      Output format:
      ```markdown
      # Regression Tests: {{bug_title}}

      ## Test File: {{file_path}}

      ## Tests Added
      | # | Test Name | Guards Against | Status |
      |---|-----------|---------------|--------|
      | 1 | {{name}} | {{failure_mode}} | PASS |
      | 2 | {{name}} | {{failure_mode}} | PASS |

      ## Test Code
      ```typescript
      {{full_test_file_content}}
      ```

      ## Coverage Impact
      - Lines covered: +{{count}} (from {{before}}% to {{after}}%)
      - Branches covered: +{{count}}
      - Specific paths tested: {{list}}
      ```

      Rules:
      - Every test must PASS on the current (fixed) codebase.
      - Deterministic only — no random data, no timing dependencies.
      - At least 3 boundary condition tests around the fix.
      - At least 2 negative/invalid input tests.
      - Do NOT duplicate existing tests.
      - Use factory functions for test data, not inline literals.
    verification: |
      Regression tests must:
      - [ ] All pass on the fixed codebase
      - [ ] Include at least 3 boundary condition tests
      - [ ] Include at least 2 negative/invalid input tests
      - [ ] Cover the exact bug scenario AND related paths
      - [ ] Have comments explaining what each test guards against
